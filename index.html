<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulSync</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>SoulSync</h1>

        <p class="tagline">
            No student should suffer in silence.
        </p>

        <div class="card">
            <h2>Anonymous Support</h2>
            <p>
                Share your feelings safely and anonymously.
            </p>
            <button>Talk Now</button>
        </div>

        <div class="card">
            <h2>Daily Mood Journal</h2>
            <p>
                Track emotions and understand your mental well-being.
            </p>
            <button>Write Journal</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
